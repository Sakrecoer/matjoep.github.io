
<!DOCTYPE html>
<html lang="en">
<head>
  <a rel="me" href="https://mastodon.social/@Matjoe">Mastodon</a>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #4f46e5;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .email-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            max-width: 450px;
            margin: 0 auto;
        }

        input[type="email"] {
            flex: 1;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            border-color: #6366f1;
        }

        button {
            padding: 14px 28px;
            background-color: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #4338ca;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
            }
            .email-form {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">BrandName</div>
        <h1>Something exciting is coming soon</h1>
        <p>We are working hard to bring you the best experience possible. Sign up to get notified when we launch!</p>
        
        <form class="email-form" action="#" method="POST">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>

</body>
</html>
